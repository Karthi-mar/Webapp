name: CI 

on:
  push:
    branches : [master]
  pull_request:
    branches : [master]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install flake8
        run: pip install flake8
        
      - name: Lint - hard errors
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint - style report
        run: flake8 . --count --max-line-length=100 --exit-zero --statistics


  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip 
          pip install -r requirements.txt
      
      - name: Run tests
        run: python -m pytest tests/ -v
      